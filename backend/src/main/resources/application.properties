spring.application.name=rate-limiter

# Redis
redis.host=${REDIS_HOST:localhost}
redis.port=${REDIS_PORT:6379}

# Rate Limiter Defaults (overridable at runtime via PUT /api/config)
ratelimiter.limit=10
ratelimiter.window-seconds=60
ratelimiter.sub-window-seconds=10

# Server
server.port=8080

# Logging
logging.level.com.ratelimiter=DEBUG
